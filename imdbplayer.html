<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>watch</title>
</head>
<body>
  <h1>watch</h1>
  <input id="id" placeholder="IMDB ID (e.g. tt1234567)" />
  <button onclick="play()">play</button>
  <br><br>
  <a id="link" href="#" target="_blank"></a>

  <script>
    function play() {
      const id = document.getElementById('id').value;
      const url = `https://vidsrc.to/embed/movie/${id}`;
      document.getElementById('link').href = url;
      document.getElementById('link').textContent = url;
    }
  </script>
</body>
</html>
